name: auth CI

on:
  push:
    paths:
      - "auth-service/**"
      - ".github/workflows/auth-ci.yml"
  pull_request:
    paths:
      - "auth-service/**"
      - ".github/workflows/auth-ci.yml"

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auth-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download deps
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build binary
        run: go build -o app main.go

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: docker build -t auth-service:latest .

      - name: Tag image
        run: docker tag auth-service:latest 975050093343.dkr.ecr.us-east-1.amazonaws.com/auth-service:latest

      - name: Push image
        run: docker push 975050093343.dkr.ecr.us-east-1.amazonaws.com/auth-service:latest